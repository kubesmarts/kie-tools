apiVersion: sonataflow.org/v1alpha08
kind: SonataFlowPlatform
metadata:
  name: sonataflow-platform
spec:
  services:
    dataIndex:
      enabled: true
      podTemplate:
        metadata:
          labels:
            # none of these labels must be applied, since overrides Operator defined ones
            app: xxx-sonataflow-platform
            app.kubernetes.io/part-of: xxx-sonataflow-platform
            app.kubernetes.io/instance: xxx-sonataflow-platform
            sonataflow.org/service: xxx-sonataflow-platform-data-index-service
            app.kubernetes.io/version: xxx-main
            app.kubernetes.io/component: xxx-sonataflow-platform-data-index-service
            app-namespace: xxx-case3
            app.kubernetes.io/managed-by: xxx-sonataflow-operator
            app.kubernetes.io/name: xxx-data-index-service
            # these labels must be applied
            my-di-label1: my-di-label1-value
            my-di-label2: my-di-label2-value
    jobService:
      enabled: true
      podTemplate:
        metadata:
          labels:
            # these labels must be applied
            my-js-label1: my-js-label1-value
            my-js-label2: my-js-label2-value
