name: "CI :: Image E2E Tests"

on:
  pull_request:
    branches: ["**"]
    types: [opened, reopened, ready_for_review, synchronize]

concurrency:
  group: ci-build-image-e2e-tests-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  TMPDIR: "/tmp"
  BUILD_ENV__accessErrorsLogFileAbsolutePath: "/tmp/build-env-access-errors.log"
  KOGITO_RUNTIME_version: "111-SNAPSHOT"
  MAVEN_ARGS: "-B -s ${{ github.workspace }}/.github/supporting-files/ci/midstream-mvn-config/settings.xml"
  MAVEN_REPO_TOKEN: ${{ github.token }}

permissions:
  contents: read
  packages: read

jobs:
  run:
    if: github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        package:
          - name: kogito-data-index-ephemeral-image
            pnpmName: "@kie/kogito-data-index-ephemeral-image"
          - name: kogito-data-index-postgresql-image
            pnpmName: "@kie/kogito-data-index-postgresql-image"
          - name: kogito-base-builder-image
            pnpmName: "@kie/kogito-base-builder-image"
          - name: kogito-jobs-service-ephemeral-image
            pnpmName: "@kie/kogito-jobs-service-ephemeral-image"
          - name: kogito-jobs-service-postgresql-image
            pnpmName: "@kie/kogito-jobs-service-postgresql-image"
          - name: sonataflow-builder-image
            pnpmName: "@kie-tools/sonataflow-builder-image"
          - name: sonataflow-devmode-image
            pnpmName: "@kie-tools/sonataflow-devmode-image"
          - name: sonataflow-management-console-image
            pnpmName: "@kie-tools/sonataflow-management-console-image"
    runs-on: ubuntu-latest
    name: "run (${{ matrix.package.name }})"
    steps:
      - name: "Checkout"
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: "Setup pnpm"
        uses: pnpm/action-setup@v6
        with:
          version: 10.34.4

      - name: "Setup Node"
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0

      - name: "Setup CI patterns"
        id: ci_patterns
        uses: ./.github/actions/setup-ci-patterns

      - name: "Setup environment"
        uses: ./.github/actions/setup-env

      - name: "Setup kie-tools"
        uses: ./.github/actions/setup-kie-tools
        with:
          KOGITO_VERSION: ${{ env.KOGITO_RUNTIME_version }}
          DEPS_BRANCHNAME: ${{ github.head_ref || 'main' }}
          PNPM_FILTER: "-F ${{ matrix.package.pnpmName }}..."

      - name: Modify pom.xml of sonataflow-quarkus-devui
        run: python .github/supporting-files/ci/osl/pom-manipulation/inject-fmp-executions.py

      - name: "Build:Prod with image e2e tests"
        shell: bash
        env:
          WEBPACK__minimize: "false"
          WEBPACK__tsLoaderTranspileOnly: "false"
          KIE_TOOLS_BUILD__runLinters: "false"
          KIE_TOOLS_BUILD__runTests: "false"
          KIE_TOOLS_BUILD__runEndToEndTests: "true"
          KIE_TOOLS_BUILD__buildContainerImages: "true"
          KIE_TOOLS_BUILD__buildExamples: "false"
          KIE_TOOLS_BUILD__ignoreTestFailures: ${{ !github.event.pull_request }}
          KIE_TOOLS_BUILD__ignoreEndToEndTestFailures: ${{ !github.event.pull_request }}
          NODE_OPTIONS: "--max_old_space_size=6144"
          MAVEN_OPTS: "-Xmx2g"
        run: >-
          eval "pnpm -r -F ${{ matrix.package.pnpmName }}... --workspace-concurrency=1 build:prod"

      - name: "Check tests result (`main` only)"
        if: always() && !cancelled()
        uses: actions/github-script@v9
        env:
          KIE_TOOLS_CI__JUNIT_REPORT_RESULTS_PATTERNS: |-
            ${{ steps.ci_patterns.outputs.tests_reports_patterns }}
            ${{ steps.ci_patterns.outputs.end_to_end_tests_reports_patterns }}
        with:
          result-encoding: string
          script: |
            const patterns = process.env["KIE_TOOLS_CI__JUNIT_REPORT_RESULTS_PATTERNS"]
                                .split("\n")
                                .map(p => p.trim())
                                .filter(p => p);

            const script = require("./scripts/check-junit-report-results/src/index.js");
            await script({ core, glob, patterns });

      - name: "Check build-env access errors log"
        if: always() && !cancelled()
        shell: bash
        run: |
          touch "$BUILD_ENV__accessErrorsLogFileAbsolutePath"
          cat "$BUILD_ENV__accessErrorsLogFileAbsolutePath"
          [ "0" == "$(cat "$BUILD_ENV__accessErrorsLogFileAbsolutePath" | wc -l | tr -d ' ')" ]

      - name: "Upload reports and artifacts"
        if: always() && !cancelled()
        uses: ./.github/actions/upload-ci-reports-and-artifacts
        with:
          partition_index: ${{ matrix.package.name }}

      - name: "Print storage usage (after build)"
        if: always() && !cancelled()
        shell: bash
        run: |
          df -h .
